services:

  # 1) PostgreSQL — 책/세션/턴/회고문
  db:
    build: ./book_db
    container_name: reading_coach_db
    environment:
      - POSTGRES_DB=books
      - POSTGRES_USER=books_reader
      - POSTGRES_PASSWORD=passwd
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U books_reader -d books"]
      interval: 5s
      retries: 5
    volumes:
      - bs_db_data:/var/lib/postgresql/data

  # 2) Backend — FastAPI + LLM
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: reading_coach_backend
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./logs:/app/logs
      - ./src:/app/src
      - ./configs:/app/configs
      - ./data:/app/data
      - ./notebooks:/app/notebooks   # 평가 노트북 산출물(eval_summary.json) → /ops/overview 품질 패널
    environment:
      - DB_HOST=db
      - DB_NAME=books
      - DB_USER=books_reader
      - DB_PASSWORD=passwd
      - DB_PORT=5432
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  # 3) Frontend — Streamlit
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: reading_coach_frontend
    command: >
      streamlit run src/dashboard.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.enableCORS=false
      --server.enableXsrfProtection=false
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    volumes:
      - ./src:/app/src
    depends_on:
      - backend

volumes:
  bs_db_data:
